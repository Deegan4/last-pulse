<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b1228" />
<title>BRAWL ARENA</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin:0; padding:0; height:100%; overflow:hidden; background:#000;
    font-family: 'Inter', system-ui, sans-serif; color:#fff;
    -webkit-tap-highlight-color: transparent; -webkit-user-select:none; user-select:none;
    touch-action:none; overscroll-behavior:none;
  }
  canvas { display:block; position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing:border-box; }
  .hud {
    position:absolute; top:calc(12px + env(safe-area-inset-top)); left:0; right:0;
    display:flex; justify-content:space-around; gap:16px; padding:0 16px;
  }
  .pcard {
    background: rgba(8,14,32,.65); border:2px solid #4af; border-radius:14px;
    padding:8px 14px; min-width:38vw; max-width:46vw; text-align:center;
    box-shadow: 0 0 18px rgba(80,160,255,.35), inset 0 0 12px rgba(80,160,255,.15);
    backdrop-filter: blur(6px);
  }
  .pcard.p2 { border-color:#f64; box-shadow: 0 0 18px rgba(255,100,80,.35), inset 0 0 12px rgba(255,100,80,.15); }
  .pcard .name { font-size:11px; letter-spacing:3px; opacity:.85; font-weight:700; }
  .pcard .pct { font-size: clamp(22px, 7vw, 38px); font-weight:900; letter-spacing:1px;
    text-shadow: 0 0 14px currentColor; }
  .pcard .stocks { font-size:14px; letter-spacing:2px; margin-top:2px; }
  #center {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; text-align:center; pointer-events:auto; padding:20px;
  }
  #title {
    font-size: clamp(38px, 12vw, 76px); font-weight: 900; letter-spacing: clamp(4px, 2vw, 10px);
    background: linear-gradient(90deg,#4af,#f6c,#fc4);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 22px rgba(80,160,255,.5));
  }
  .panel {
    background: rgba(8,14,32,.65); border:1px solid rgba(140,180,255,.45);
    padding:14px 18px; border-radius:14px; backdrop-filter: blur(6px);
    box-shadow: 0 0 30px rgba(80,160,255,.2), inset 0 0 30px rgba(255,100,180,.08);
    max-width: 86vw; font-size: clamp(13px, 3.6vw, 16px);
  }
  .panel p { margin: 6px 0; opacity:.9; }
  kbd {
    display:inline-block; padding:2px 7px; border-radius:6px;
    background:#111a; border:1px solid #4af6; color:#bff; font-family: ui-monospace, monospace;
  }
  button {
    pointer-events:auto; cursor:pointer; -webkit-appearance:none; appearance:none;
    background: linear-gradient(90deg,#13335a,#1a4670); color:#dff;
    border:1px solid #6af; padding:14px 32px; border-radius:12px;
    font-weight:800; letter-spacing:3px; font-size:16px; text-transform:uppercase;
    min-height:54px; min-width:170px;
    box-shadow: 0 0 20px rgba(80,160,255,.6), inset 0 0 12px rgba(120,200,255,.3);
  }
  button:active { transform: scale(.96); }
  .hidden { display:none !important; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition: opacity .25s; }

  /* Touch controls */
  #touch { position:absolute; inset:0; pointer-events:none; opacity:0; transition: opacity .3s; }
  #touch.active { opacity:1; }
  #touch.active #stick, #touch.active .btn { pointer-events:auto; }
  #stick {
    position:absolute; left:calc(22px + env(safe-area-inset-left)); bottom:calc(22px + env(safe-area-inset-bottom));
    width:135px; height:135px; border-radius:50%;
    background: radial-gradient(circle, rgba(80,160,255,.18), rgba(80,160,255,.04) 60%, transparent 75%);
    border:2px solid rgba(120,200,255,.55);
    box-shadow: 0 0 24px rgba(80,160,255,.3), inset 0 0 24px rgba(80,160,255,.15);
    touch-action:none;
  }
  #knob {
    position:absolute; left:50%; top:50%; width:60px; height:60px; margin:-30px 0 0 -30px; border-radius:50%;
    background: radial-gradient(circle, #cdf, #258);
    box-shadow: 0 0 16px #6cf, inset 0 0 12px #fff8;
    transition: transform .04s linear;
  }
  .btns {
    position:absolute; right:calc(22px + env(safe-area-inset-right)); bottom:calc(22px + env(safe-area-inset-bottom));
    display:grid; grid-template-columns: 86px 86px; grid-template-rows: 86px 86px;
    gap:10px; align-items:center; justify-items:center;
  }
  .btn {
    width:84px; height:84px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:18px; letter-spacing:1px;
    border:2px solid #6af; color:#dff;
    background: radial-gradient(circle, rgba(80,160,255,.25), rgba(80,160,255,.05) 65%, transparent 80%);
    box-shadow: 0 0 18px rgba(80,160,255,.35), inset 0 0 18px rgba(120,200,255,.18);
    touch-action:none; user-select:none;
  }
  .btn small { display:block; font-size:9px; letter-spacing:2px; opacity:.7; }
  #btnA { border-color:#fc4; color:#ffd; background: radial-gradient(circle, rgba(255,200,80,.25), rgba(255,200,80,.05) 65%, transparent 80%); box-shadow: 0 0 18px rgba(255,200,80,.35), inset 0 0 18px rgba(255,220,140,.2); grid-column:2; grid-row:2; }
  #btnB { border-color:#f49; color:#fcd; background: radial-gradient(circle, rgba(255,80,160,.25), rgba(255,80,160,.05) 65%, transparent 80%); box-shadow: 0 0 18px rgba(255,80,160,.35), inset 0 0 18px rgba(255,140,200,.2); grid-column:1; grid-row:2; }
  #btnJ { border-color:#6f9; color:#dfe; background: radial-gradient(circle, rgba(80,255,160,.22), rgba(80,255,160,.04) 65%, transparent 80%); box-shadow: 0 0 18px rgba(80,255,160,.35), inset 0 0 18px rgba(140,255,200,.2); grid-column:2; grid-row:1; }
  #btnS { border-color:#aaf; color:#ddf; background: radial-gradient(circle, rgba(160,160,255,.22), rgba(160,160,255,.04) 65%, transparent 80%); box-shadow: 0 0 18px rgba(160,160,255,.3), inset 0 0 18px rgba(200,200,255,.2); grid-column:1; grid-row:1; }
  .btn.on { transform: scale(.92); filter: brightness(1.6); }

  #announce {
    position:absolute; left:0; right:0; top:32%; text-align:center; pointer-events:none;
    font-size: clamp(40px, 10vw, 80px); font-weight:900; letter-spacing:6px;
    text-shadow: 0 0 24px currentColor, 0 4px 0 #000a;
    opacity:0; transition: opacity .25s, transform .25s;
    transform: scale(0.7);
  }
  #announce.show { opacity:1; transform: scale(1); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="hud">
    <div class="pcard" id="card1">
      <div class="name" id="name1" style="color:#9cf">P1</div>
      <div class="pct" id="pct1" style="color:#6cf">0%</div>
      <div class="stocks" id="stocks1">●●●</div>
    </div>
    <div class="pcard p2" id="card2">
      <div class="name" id="name2" style="color:#fc8">CPU</div>
      <div class="pct" id="pct2" style="color:#f86">0%</div>
      <div class="stocks" id="stocks2">●●●</div>
    </div>
  </div>
  <div id="announce"></div>
  <div id="center">
    <div id="title">BRAWL ARENA</div>
    <div class="panel hidden" id="intro"></div>
    <button id="mode" class="btn-mode" type="button">MODE: VS CPU</button>
    <button id="start">FIGHT</button>
    <button id="settingsBtn" class="btn-mode" type="button">SETTINGS</button>
    <p id="p2hint" class="p2hint hidden"><b style="color:#fc8">P2</b> keyboard: Arrows + <kbd>,</kbd> hit <kbd>.</kbd> smash <kbd>/</kbd> shield <kbd>Enter</kbd> jump &nbsp;·&nbsp; or plug in a 2nd controller</p>
  </div>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-panel">
      <h2>SETTINGS</h2>
      <label class="row"><span>Stocks per fighter</span>
        <select id="setStocks"><option value="1">1</option><option value="3" selected>3</option><option value="5">5</option><option value="9">9</option></select>
      </label>
      <label class="row"><span>CPU difficulty</span>
        <select id="setDiff"><option value="easy">Easy</option><option value="normal" selected>Normal</option><option value="hard">Hard</option></select>
      </label>
      <label class="row"><span>SFX volume</span>
        <input id="setVol" type="range" min="0" max="100" value="70">
      </label>
      <label class="row check"><input id="setShake" type="checkbox" checked> <span>Screen shake</span></label>
      <label class="row check"><input id="setHitbox" type="checkbox"> <span>Show hitboxes (debug)</span></label>
      <button id="settingsDone">DONE</button>
    </div>
  </div>

  <div id="pauseModal" class="modal hidden">
    <div class="modal-panel">
      <h2>PAUSED</h2>
      <button id="resumeBtn">RESUME</button>
      <button id="restartBtn" class="btn-mode" type="button">RESTART</button>
      <button id="quitBtn" class="btn-mode" type="button">MAIN MENU</button>
      <p class="modal-hint"><kbd>Esc</kbd> / <kbd>P</kbd> / controller <kbd>START</kbd> to resume</p>
    </div>
  </div>

  <button id="pauseBtn" class="pause-glyph" type="button" aria-label="Pause">⏸</button>

  <div id="flash"></div>
  <div id="touch">
    <div id="stick"><div id="knob"></div></div>
    <div class="btns">
      <div class="btn" id="btnS">SHLD<small>↓</small></div>
      <div class="btn" id="btnJ">JUMP<small>↑</small></div>
      <div class="btn" id="btnB">B<small>SMASH</small></div>
      <div class="btn" id="btnA">A<small>HIT</small></div>
    </div>
  </div>
</div>

<style>
  @media (hover: hover) and (pointer: fine) { #touch { display:none !important; } .ctrl-mobile { display:none; } }
  @media (hover: none) and (pointer: coarse) { .ctrl-desktop { display:none; } }
  .btn-mode {
    background: linear-gradient(90deg,#3a1a4a,#5a226a) !important;
    border-color:#c6f !important;
    box-shadow: 0 0 14px rgba(200,120,255,.45), inset 0 0 10px rgba(220,160,255,.25) !important;
    min-width:0 !important;
    min-height:36px !important;
    padding:6px 18px !important;
    font-size:12px !important;
    letter-spacing:2px !important;
  }
  .btn-mode.on { background: linear-gradient(90deg,#3a4a1a,#5a6a22) !important; border-color:#cf6 !important;
    box-shadow: 0 0 14px rgba(180,255,120,.45), inset 0 0 10px rgba(200,255,160,.25) !important; }
  .p2hint { font-size:13px; opacity:.85; margin:8px 0 0; text-align:center; max-width:86vw;
    padding:8px 12px; background: rgba(8,14,32,.55); border:1px dashed rgba(255,200,120,.4); border-radius:10px; }

  /* Modal overlays (settings, pause) */
  .modal {
    position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background: rgba(2,4,12,.78); backdrop-filter: blur(4px); pointer-events:auto;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .modal-panel {
    background: linear-gradient(180deg, rgba(20,28,60,.95), rgba(10,14,32,.95));
    border:1px solid rgba(140,180,255,.55); border-radius:16px;
    padding:22px 26px; min-width:300px; max-width:92vw;
    box-shadow: 0 0 40px rgba(80,160,255,.35), inset 0 0 30px rgba(80,160,255,.1);
    display:flex; flex-direction:column; gap:12px; align-items:stretch;
  }
  .modal-panel h2 {
    margin:0 0 4px; text-align:center; letter-spacing:6px; font-size:22px;
    background: linear-gradient(90deg,#4af,#f6c,#fc4); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 12px rgba(80,160,255,.4));
  }
  .modal-panel .row { display:flex; align-items:center; justify-content:space-between; gap:14px; font-size:14px; }
  .modal-panel .row.check { justify-content:flex-start; gap:10px; }
  .modal-panel select, .modal-panel input[type="range"] {
    background:#0a1226; color:#dff; border:1px solid #4af6; border-radius:8px; padding:6px 10px;
    font: inherit; min-width:120px;
  }
  .modal-panel input[type="range"] { padding:0; height:24px; }
  .modal-panel input[type="checkbox"] { width:18px; height:18px; accent-color:#6cf; }
  .modal-panel .modal-hint { text-align:center; opacity:.7; font-size:12px; margin:6px 0 0; }
  /* Floating pause glyph during play */
  .pause-glyph {
    position:fixed; top: calc(12px + env(safe-area-inset-top)); right: calc(12px + env(safe-area-inset-right));
    z-index:11; min-width:0 !important; min-height:0 !important;
    width:44px; height:44px; padding:0 !important; font-size:22px !important; letter-spacing:0 !important;
    border-radius:50% !important; display:none; line-height:1;
  }
  .pause-glyph.show { display:flex; align-items:center; justify-content:center; }
</style>

<script>
(() => {
'use strict';

// ---------- Canvas setup ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
const isMobile = matchMedia('(hover: none) and (pointer: coarse)').matches || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

function resize() {
  DPR = Math.min(devicePixelRatio || 1, isMobile ? 1.75 : 2);
  W = innerWidth; H = innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 200));

// ---------- World ----------
const GRAV = 0.85;
const FLOOR_Y = () => H * 0.78;
function platforms() {
  const fy = FLOOR_Y();
  const w = W;
  return [
    { x: w*0.12, y: fy,       w: w*0.76, h: 22, main:true },
    { x: w*0.22, y: fy - 110, w: w*0.18, h: 12 },
    { x: w*0.60, y: fy - 110, w: w*0.18, h: 12 },
    { x: w*0.42, y: fy - 200, w: w*0.16, h: 12 },
  ];
}
let PLATS = platforms();
addEventListener('resize', () => PLATS = platforms());

// ---------- Input ----------
const keys = {};
const input = {
  p1: { x:0, y:0, jump:false, attack:false, smash:false, shield:false, _jPress:false, _aPress:false, _sPress:false },
  p2: { x:0, y:0, jump:false, attack:false, smash:false, shield:false, _jPress:false, _aPress:false, _sPress:false }
};
// Game mode: 'cpu' = P1 vs CPU (P1 may use both WASD and arrows); '2p' = local P1 vs P2 (P1 = WASD only, P2 = arrows).
// localStorage may throw in sandboxed previews — guard reads/writes.
function safeGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function safeSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
let gameMode = safeGet('brawl.mode') === '2p' ? '2p' : 'cpu';

// Persistent settings — read once, mutated by the settings modal, written on change.
const settings = (() => {
  let s;
  try { s = JSON.parse(safeGet('brawl.settings') || ''); } catch { s = null; }
  return Object.assign({
    stocks: 3,
    difficulty: 'normal',  // 'easy' | 'normal' | 'hard'
    sfxVol: 0.7,           // 0..1, scales the master gain
    shake: true,
    showHitbox: false,
  }, s || {});
})();
function saveSettings() { safeSet('brawl.settings', JSON.stringify(settings)); }

let paused = false;
addEventListener('keydown', e => {
  if (e.repeat) return;
  keys[e.key.toLowerCase()] = true;
  if (e.code === 'Space') keys[' '] = true;
});
addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.code === 'Space') keys[' '] = false;
});

// Touch joystick
const touchVec = { x:0, y:0 };
const stickEl = document.getElementById('stick');
const knobEl = document.getElementById('knob');
let stickId = null, stickCx=0, stickCy=0, stickR=55;
function sStart(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = stickEl.getBoundingClientRect();
  stickCx = r.left + r.width/2; stickCy = r.top + r.height/2; stickR = r.width/2 - 10;
  stickId = t.identifier;
  sMove(e);
}
function sMove(e) {
  e.preventDefault();
  let t;
  for (const ct of e.changedTouches) if (ct.identifier === stickId) { t = ct; break; }
  if (!t) return;
  let dx = t.clientX - stickCx, dy = t.clientY - stickCy;
  const d = Math.hypot(dx, dy);
  if (d > stickR) { dx = dx/d*stickR; dy = dy/d*stickR; }
  knobEl.style.transform = `translate(${dx}px, ${dy}px)`;
  touchVec.x = dx / stickR; touchVec.y = dy / stickR;
}
function sEnd(e) {
  let found = false;
  for (const ct of e.changedTouches) if (ct.identifier === stickId) { found = true; break; }
  if (!found) return;
  stickId = null; touchVec.x = 0; touchVec.y = 0;
  knobEl.style.transform = 'translate(0,0)';
}
stickEl.addEventListener('touchstart', sStart, { passive:false });
stickEl.addEventListener('touchmove', sMove, { passive:false });
stickEl.addEventListener('touchend', sEnd);
stickEl.addEventListener('touchcancel', sEnd);

function bindBtn(id, prop) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    input.p1[prop] = true;
    input.p1['_' + prop[0] + 'Press'] = true; // jPress / aPress / sPress
    el.classList.add('on');
  }, { passive:false });
  const up = () => { input.p1[prop] = false; el.classList.remove('on'); };
  el.addEventListener('touchend', up);
  el.addEventListener('touchcancel', up);
}
// J,A,B,S buttons
const btnJ = document.getElementById('btnJ');
const btnA = document.getElementById('btnA');
const btnB = document.getElementById('btnB');
const btnS = document.getElementById('btnS');
function tbind(el, downFn, upFn) {
  el.addEventListener('touchstart', e => { e.preventDefault(); downFn(); el.classList.add('on'); }, { passive:false });
  const up = () => { upFn(); el.classList.remove('on'); };
  el.addEventListener('touchend', up); el.addEventListener('touchcancel', up);
}
tbind(btnJ, () => { input.p1.jump = true; input.p1._jPress = true; }, () => input.p1.jump = false);
tbind(btnA, () => { input.p1.attack = true; input.p1._aPress = true; }, () => input.p1.attack = false);
tbind(btnB, () => { input.p1.smash = true; input.p1._sPress = true; }, () => input.p1.smash = false);
tbind(btnS, () => { input.p1.shield = true; }, () => input.p1.shield = false);

// ---------- Gamepad (Xbox / PlayStation / Switch Pro / generic via Standard Mapping) ----------
// axes[0]=LX, axes[1]=LY, axes[2]=RX, axes[3]=RY
// buttons: 0=A/Cross, 1=B/Circle, 2=X/Square, 3=Y/Triangle, 4=LB, 5=RB, 6=LT, 7=RT,
//          8=Back/Select, 9=Start, 10=L3, 11=R3, 12-15=DPad U/D/L/R, 16=Home
const GP_DEAD = 0.22;
const GP_TRIG = 0.4;
const gpPrev = [[], [], [], []]; // per-slot previous button states for edge detection
const gpFrame = [null, null, null, null]; // per-slot decoded state for current frame
let gpConnected = false;

function pollGamepad(slot) {
  if (!navigator.getGamepads) return null;
  const list = navigator.getGamepads();
  const gp = list && list[slot];
  if (!gp || !gp.connected) { gpPrev[slot] = []; return null; }

  const pressed = i => {
    const b = gp.buttons[i];
    if (!b) return false;
    if (typeof b === 'object') return b.pressed || b.value > GP_TRIG;
    return b > GP_TRIG;
  };
  const prev = gpPrev[slot];
  const edge = i => pressed(i) && !prev[i];

  // Movement: stick + dpad (dpad overrides if pressed)
  const ax = gp.axes[0] || 0, ay = gp.axes[1] || 0;
  let lx = Math.abs(ax) > GP_DEAD ? ax : 0;
  let ly = Math.abs(ay) > GP_DEAD ? ay : 0;
  if (pressed(14)) lx = -1;     // dpad left
  if (pressed(15)) lx =  1;     // dpad right
  if (pressed(12)) ly = -1;     // dpad up
  if (pressed(13)) ly =  1;     // dpad down

  const out = {
    lx, ly,
    // Jump: A/Cross OR shoulder click L3 (stick-up jumpers use ly)
    jumpPress: edge(0),
    jumpHeld:  pressed(0),
    // Light attack: X/Square or B/Circle
    attackPress: edge(2) || edge(1),
    attackHeld:  pressed(2) || pressed(1),
    // Smash: Y/Triangle or RT/LT
    smashPress: edge(3) || edge(7) || edge(6),
    smashHeld:  pressed(3) || pressed(7) || pressed(6),
    // Shield: LB or RB
    shieldHeld: pressed(4) || pressed(5),
    // Start/Menu
    startPress: edge(9),
    // Hold the latest snapshot so we can rebuild prev after this frame
    _btnCount: gp.buttons.length,
    _pressedFn: pressed,
  };

  // commit prev for next frame
  const np = new Array(gp.buttons.length);
  for (let i = 0; i < gp.buttons.length; i++) np[i] = pressed(i);
  gpPrev[slot] = np;
  return out;
}

function pollAllGamepads() {
  let anyConnected = false;
  for (let i = 0; i < 4; i++) {
    gpFrame[i] = pollGamepad(i);
    if (gpFrame[i]) anyConnected = true;
  }
  if (anyConnected && !gpConnected) gpConnected = true;

  // START button:
  //  - In play, toggles pause.
  //  - On menu/end (and no modal open), starts the match.
  if (gameState === 'playing') {
    for (const g of gpFrame) if (g && g.startPress) { togglePause(); break; }
  } else if (!isModalOpen()) {
    for (const g of gpFrame) {
      if (g && (g.startPress || g.jumpPress)) { startGame(); break; }
    }
  }
}

addEventListener('gamepadconnected', e => {
  gpConnected = true;

// ---------- Fighter ----------
function makeFighter(opts) {
  return {
    x: opts.x, y: opts.y, vx: 0, vy: 0,
    w: 44, h: 70,
    facing: opts.facing || 1,
    onGround: false,
    jumps: 0, // doubles
    pct: 0,
    stocks: settings.stocks,
    color: opts.color, // body
    headColor: opts.headColor,
    name: opts.name,
    isAI: !!opts.isAI,
    // states
    attackTimer: 0,      // counts down from move's total frames
    attackType: null,    // key into MOVES
    attackAir: false,    // true if started airborne (locks the move set)
    attackCooldown: 0,
    shieldOn: false, shieldHP: 100, shieldRegen: 0,
    hitstun: 0,
    invul: 60,           // spawn invul
    knockoutAnim: 0,
    // visuals
    squash: 1,
    blinkT: Math.random()*200,
    // AI memory
    aiCool: 0, aiJumpCool: 0,
  };
}

let P1, P2;
function spawnFighters() {
  PLATS = platforms();
  const p2Name = gameMode === '2p' ? 'P2' : 'CPU';
  P1 = makeFighter({ x: W*0.35, y: FLOOR_Y() - 80, color:'#39f', headColor:'#cce8ff', name:'P1', facing: 1 });
  P2 = makeFighter({ x: W*0.65, y: FLOOR_Y() - 80, color:'#f55', headColor:'#ffd2c2', name:p2Name, facing:-1, isAI: gameMode !== '2p' });
}

// ---------- Effects ----------
const particles = [];
function spark(x,y,color,n=12,spd=4) {
  for (let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const s = spd*(0.5+Math.random());
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color, size: 3+Math.random()*3 });
  }
}
// Impact rings (item 6) — expanding stroked circle at hit points, attacker-tinted.
const rings = [];
const RING_MAX = 32;
function pushRing(x, y, color, r0 = 8, r1 = 60, life = 18) {
  if (rings.length >= RING_MAX) rings.shift();
  rings.push({ x, y, color, r0, r1, life, age: 0 });
}
function drawRings() {
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    const t = ring.age / ring.life;
    if (t >= 1) { rings.splice(i, 1); continue; }
    const r = ring.r0 + (ring.r1 - ring.r0) * t;
    const a = (1 - t) * 0.85;
    ctx.strokeStyle = ring.color.startsWith('rgba') ? ring.color : hexToRgba(ring.color, a);
    ctx.lineWidth = 3 * (1 - t * 0.6);
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ring.age++;
  }
}

// Knockback streak ghosts (item 7) — semi-transparent silhouette trail for fighters
// in heavy hitstun. Drawn before the live fighter so the live one stays on top.
const trailGhosts = [];
const GHOST_MAX = 16;
function pushGhost(f) {
  if (trailGhosts.length >= GHOST_MAX) trailGhosts.shift();
  trailGhosts.push({
    x: f.x, y: f.y, w: f.w, h: f.h, facing: f.facing,
    color: damageTint(f.color, f.pct), age: 0, life: 12,
  });
}
function drawGhosts() {
  for (let i = trailGhosts.length - 1; i >= 0; i--) {
    const g = trailGhosts[i];
    if (g.age >= g.life) { trailGhosts.splice(i, 1); continue; }
    const a = (1 - g.age / g.life) * 0.45;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = g.color;
    // Simplified silhouette: torso + head circle. No detail — it's a blur.
    roundRect(g.x + g.w*0.10, g.y + g.h*0.10, g.w*0.80, g.h*0.50, 8);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(g.x + g.w/2, g.y + g.h*0.14, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    g.age++;
  }
}

// Helper for ring alpha — accepts #rgb or #rrggbb base colors.
function hexToRgba(hex, alpha) {
  const m = hex.match(/^#([0-9a-f]{3,6})$/i);
  if (!m) return hex;
  const h = m[1];
  let r, g, b;
  if (h.length === 3) {
    r = parseInt(h[0]+h[0], 16); g = parseInt(h[1]+h[1], 16); b = parseInt(h[2]+h[2], 16);
  } else {
    r = parseInt(h.slice(0,2), 16); g = parseInt(h.slice(2,4), 16); b = parseInt(h.slice(4,6), 16);
  }
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

let shake = 0;
function doShake(n) { if (settings.shake) shake = Math.max(shake, n); }

// ---------- Audio (WebAudio synth) ----------
let actx = null, master = null;
function audioInit() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.25 * settings.sfxVol; master.connect(actx.destination);
}
function applySfxVol() { if (master) master.gain.value = 0.25 * settings.sfxVol; }
function tone(freq, dur=0.1, type='square', vol=0.18, sweepTo=null) {
  if (!actx) return;
  const o = actx.createOscillator(); o.type = type; o.frequency.value = freq;
  if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(sweepTo, actx.currentTime + dur);
  const g = actx.createGain(); g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  o.connect(g).connect(master); o.start(); o.stop(actx.currentTime + dur);
}
function noise(dur=0.15, vol=0.3, lp=1500) {
  if (!actx) return;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
  const g = actx.createGain(); g.gain.value = vol;
  src.connect(f).connect(g).connect(master); src.start();
}

// ---------- Physics helpers ----------
function landOnPlatforms(f, prevY) {
  f.onGround = false;
  for (const p of PLATS) {
    const onTop = (prevY + f.h <= p.y + 1) && (f.y + f.h >= p.y) && (f.x + f.w*0.4 > p.x) && (f.x - f.w*0.4 < p.x + p.w);
    if (onTop && f.vy >= 0) {
      f.y = p.y - f.h;
      f.vy = 0;
      f.onGround = true;
      if (!f._wasGround) { spark(f.x, f.y+f.h, '#ddd', 6, 2.4); f.squash = 0.7; }
      f.jumps = 0;
      break;
    }
  }
  f._wasGround = f.onGround;
}

function applyKnockback(target, dmg, angle, base, scaling, attacker) {
  if (target.invul > 0) return false;
  const hx = target.x + target.w/2;
  const hy = target.y + target.h/2;
  // Attacker color falls back to a neutral hot orange when no attacker context (legacy callers).
  const atkColor = attacker?.color || '#fc4';
  if (target.shieldOn && target.shieldHP > 0) {
    target.shieldHP -= dmg*2;
    target.vx += Math.cos(angle) * 1.2;
    spark(hx, hy, '#9cf', 6, 3);
    pushRing(hx, hy, '#9cf', 18, 44, 14);
    tone(220, 0.08, 'sawtooth', 0.12);
    return false;
  }
  target.pct += dmg;
  const power = base + (target.pct * scaling) * 0.04;
  target.vx = Math.cos(angle) * power;
  target.vy = Math.sin(angle) * power;
  target.hitstun = Math.min(40, 10 + power*1.4);
  target.invul = 8;
  // Sparks now tint by attacker (item 14): attacker color + white core.
  spark(hx, hy, atkColor, 14, 5);
  spark(hx, hy, '#fff',   6, 7);
  // Impact ring (item 6) — size scaled by hit power.
  pushRing(hx, hy, atkColor, 10, 36 + power * 2.0, 18);
  doShake(Math.min(14, 3 + power*0.4));
  hitStop = Math.min(8, 3 + Math.floor(power*0.3));
  tone(180 + dmg*15, 0.1, 'square', 0.18, 60);
  noise(0.08, 0.18);
  if (target.pct > 100) flash();
  return true;
}

// Move table. Coordinate convention:
//   dx, dy: hitbox center offset from fighter CENTER, in fighter widths/heights.
//           dx > 0 = front of fighter (mirrored by facing). bothSides skips mirroring.
//   w, h:   hitbox size, in fighter widths/heights.
//   ang:    launch angle in radians AS IF FACING RIGHT. Auto-mirrored by facing.
//           -PI/2 = straight up, 0 = right, +PI/2 = straight down.
//   startup/active/recover: frame timing. attackTimer init = sum of all three.
//   cd:     attackCooldown after the move.
const MOVES = {
  // Ground tilts (light button + direction)
  jab:    { startup:3, active:3, recover:5,  cd:14, dmg:4,  base:5,  scl:0.4, dx:0.70, dy:-0.05, w:0.85, h:0.50, ang:-0.10 },
  ftilt:  { startup:5, active:4, recover:10, cd:24, dmg:7,  base:6,  scl:0.7, dx:0.85, dy:-0.05, w:1.00, h:0.55, ang:-0.18 },
  utilt:  { startup:4, active:5, recover:10, cd:26, dmg:7,  base:7,  scl:0.8, dx:0.10, dy:-0.70, w:0.95, h:0.55, ang:-Math.PI/2+0.25 },
  dtilt:  { startup:4, active:3, recover:8,  cd:20, dmg:6,  base:5,  scl:0.5, dx:0.55, dy:0.45,  w:1.00, h:0.30, ang:-0.50 },
  // Ground smashes (smash button + direction)
  fsmash: { startup:8, active:4, recover:16, cd:38, dmg:14, base:9,  scl:1.6, dx:0.60, dy:-0.05, w:1.40, h:0.80, ang:-0.35, sweep:true },
  usmash: { startup:7, active:5, recover:16, cd:38, dmg:14, base:10, scl:1.5, dx:0.0,  dy:-0.85, w:1.20, h:0.70, ang:-Math.PI/2+0.15 },
  dsmash: { startup:6, active:4, recover:14, cd:36, dmg:12, base:9,  scl:1.4, dx:0.0,  dy:0.55,  w:1.80, h:0.40, ang:-0.18, bothSides:true },
  // Aerials (either button while airborne, direction picks which)
  nair:   { startup:3, active:6, recover:8,  cd:18, dmg:7,  base:6,  scl:0.6, dx:0.0,  dy:0.10,  w:1.50, h:0.95, ang:-0.40, bothSides:true },
  fair:   { startup:5, active:4, recover:10, cd:22, dmg:9,  base:7,  scl:0.9, dx:0.75, dy:0.0,   w:1.10, h:0.70, ang:-0.30 },
  bair:   { startup:4, active:3, recover:10, cd:20, dmg:8,  base:8,  scl:1.0, dx:-0.85,dy:0.0,   w:1.00, h:0.65, ang:Math.PI+0.20 },
  uair:   { startup:4, active:5, recover:10, cd:22, dmg:8,  base:7,  scl:0.8, dx:0.10, dy:-0.65, w:1.10, h:0.65, ang:-Math.PI/2+0.20 },
  dair:   { startup:8, active:5, recover:14, cd:28, dmg:11, base:8,  scl:1.1, dx:0.05, dy:0.75,  w:1.00, h:0.60, ang:Math.PI/2-0.15, spike:true },
};

function selectMove(f, isSmash, mx, my) {
  const air = !f.onGround;
  if (air) {
    if (my < -0.4) return 'uair';
    if (my >  0.4) return 'dair';
    if (Math.abs(mx) > 0.3) {
      const inputDir = mx > 0 ? 1 : -1;
      return inputDir === f.facing ? 'fair' : 'bair';
    }
    return 'nair';
  }
  if (isSmash) {
    if (my < -0.4) return 'usmash';
    if (my >  0.4) return 'dsmash';
    return 'fsmash';
  }
  if (my < -0.4) return 'utilt';
  if (my >  0.4) return 'dtilt';
  if (Math.abs(mx) > 0.3) return 'ftilt';
  return 'jab';
}

function hitboxFor(f) {
  if (f.attackTimer <= 0) return null;
  const m = MOVES[f.attackType]; if (!m) return null;
  const dir = f.facing;
  const cx = f.x + f.w/2, cy = f.y + f.h/2;
  const bw = f.w * m.w, bh = f.h * m.h;
  let ox = m.dx * f.w * dir;
  if (m.bothSides) ox = 0;
  const bx = cx + ox - bw/2;
  const by = cy + m.dy * f.h - bh/2;
  let ang = m.ang;
  if (dir < 0 && !m.bothSides) ang = Math.PI - ang;   // mirror horizontally
  return { x:bx, y:by, w:bw, h:bh, dmg:m.dmg, base:m.base, scaling:m.scl, angle:ang, spike:!!m.spike };
}
function aabb(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ---------- Update ----------
function updateFighter(f, control) {
  // Inputs decode
  let mx = 0, my = 0, jumpPress = false, attackPress = false, smashPress = false, shield = false;
  if (control === 'p1') {
    const twoP = gameMode === '2p';
    // P1 keyboard: WASD always. Arrow keys only when NOT in 2P (so they don't conflict with P2).
    if (keys['a'] || (!twoP && keys['arrowleft'])) mx -= 1;
    if (keys['d'] || (!twoP && keys['arrowright'])) mx += 1;
    if (keys['w'] || (!twoP && keys['arrowup'])) my -= 1;
    // In 1P mode, ArrowDown is the down-direction modifier. In 2P mode, P1 has no dedicated "down" key
    // for tilts/aerials apart from analog stick — keyboard P1 down-attacks need stick or gamepad.
    if (!twoP && keys['arrowdown']) my += 1;
    // joystick add
    if (Math.abs(touchVec.x) > 0.15) mx += touchVec.x;
    if (touchVec.y < -0.55) my -= 1;
    if (touchVec.y >  0.55) my += 1;
    // Gamepad merge (slot 0)
    const gp = gpFrame[0];
    if (gp) {
      if (Math.abs(gp.lx) > 0) mx += gp.lx;
      if (gp.ly < -0.45) my -= 1;
      if (gp.ly >  0.45) my += 1;
    }
    mx = Math.max(-1, Math.min(1, mx));
    my = Math.max(-1, Math.min(1, my));
    // edges
    jumpPress = (keys['w'] || keys[' '] || (!twoP && keys['arrowup']) || input.p1._jPress || (gp && gp.jumpPress));
    attackPress = (keys['j'] || input.p1._aPress || (gp && gp.attackPress));
    smashPress = (keys['k'] || keys['l'] || input.p1._sPress || (gp && gp.smashPress));
    // Shield: kbd 's' (without arrowdown when in 1P), touch shield button, or gamepad LB/RB
    shield = (keys['s'] && !(!twoP && keys['arrowdown'])) || input.p1.shield || (gp && gp.shieldHeld);
    input.p1._jPress = false; input.p1._aPress = false; input.p1._sPress = false;
  } else if (control === 'p2') {
    // P2 keyboard: arrows + , . / Enter
    if (keys['arrowleft'])  mx -= 1;
    if (keys['arrowright']) mx += 1;
    if (keys['arrowup'])    my -= 1;
    if (keys['arrowdown'])  my += 1;
    // Gamepad slot 1
    const gp = gpFrame[1];
    if (gp) {
      if (Math.abs(gp.lx) > 0) mx += gp.lx;
      if (gp.ly < -0.45) my -= 1;
      if (gp.ly >  0.45) my += 1;
    }
    mx = Math.max(-1, Math.min(1, mx));
    my = Math.max(-1, Math.min(1, my));
    jumpPress  = (keys['arrowup'] || keys['enter'] || input.p2._jPress || (gp && gp.jumpPress));
    attackPress= (keys[','] || input.p2._aPress || (gp && gp.attackPress));
    smashPress = (keys['.'] || input.p2._sPress || (gp && gp.smashPress));
    // P2 shield is '/' — but ArrowDown means "down direction" for P2, not shield, mirroring P1's mx/my semantics.
    shield = keys['/'] || input.p2.shield || (gp && gp.shieldHeld);
    input.p2._jPress = false; input.p2._aPress = false; input.p2._sPress = false;
  } else {
    // AI — scaled by settings.difficulty
    const D = settings.difficulty;
    // attack/jump probability per attempt and shield reaction rate
    const probAtk    = D === 'hard' ? 0.16 : D === 'easy' ? 0.05 : 0.10;
    const probJump   = D === 'hard' ? 0.14 : D === 'easy' ? 0.05 : 0.08;
    const probShield = D === 'hard' ? 0.30 : D === 'easy' ? 0.05 : 0.15;
    const smashAt    = D === 'hard' ? 50  : D === 'easy' ? 110 : 70;   // pct threshold to prefer smash
    const reach      = D === 'hard' ? 90  : D === 'easy' ? 55  : 70;
    const dx = P1.x - f.x;
    const dy = P1.y - f.y;
    const adx = Math.abs(dx);
    f.aiCool--; f.aiJumpCool--;
    f.facing = dx >= 0 ? 1 : -1;
    if (adx > 80) mx = dx > 0 ? 1 : -1;
    else if (adx < 50 && Math.random() < 0.04) mx = dx > 0 ? -1 : 1;
    if (f.aiJumpCool <= 0 && (dy < -40 || (!f.onGround && f.jumps < 2 && Math.random()<0.02))) {
      if (Math.random() < probJump) { jumpPress = true; f.aiJumpCool = 25; }
    }
    if (f.aiCool <= 0 && adx < reach && Math.abs(dy) < 80) {
      if (dy < -30) my = -1;
      else if (dy > 30 && !f.onGround) my = 1;
      if (Math.random() < probAtk * 3 + 0.1) {
        if (Math.random() < 0.5 && P1.pct > smashAt) { smashPress = true; f.aiCool = D === 'hard' ? 36 : 50; }
        else { attackPress = true; f.aiCool = D === 'hard' ? 16 : 22; }
      }
    }
    if (P1.attackTimer > 0 && adx < 80 && Math.random() < probShield) shield = true;
    if (f.x < W*0.12 || f.x > W*0.88) {
      mx = (f.x < W*0.5) ? 1 : -1;
      if (f.aiJumpCool <= 0 && !f.onGround) { jumpPress = true; f.aiJumpCool = 18; }
    }
  }

  // Move
  if (f.hitstun > 0) f.hitstun--;
  const stunned = f.hitstun > 0;
  const canControl = !stunned && f.attackTimer <= 0 && f.knockoutAnim <= 0;
  f.shieldOn = shield && canControl && f.onGround && f.shieldHP > 0;

  if (canControl && !f.shieldOn) {
    const speed = f.onGround ? 4.6 : 3.4;
    f.vx += mx * (f.onGround ? 0.9 : 0.5);
    f.vx = Math.max(-speed, Math.min(speed, f.vx));
    if (mx !== 0) f.facing = mx > 0 ? 1 : -1;
  }
  // friction
  if (f.onGround) f.vx *= (f.shieldOn ? 0.7 : 0.82);
  else f.vx *= 0.985;

  // Jump
  if (jumpPress && canControl) {
    if (f.onGround) { f.vy = -14.5; f.onGround = false; f.jumps = 1; f.squash = 1.3; spark(f.x+f.w/2, f.y+f.h, '#fff', 6, 3); tone(520, 0.08, 'triangle', 0.14); }
    else if (f.jumps < 2) { f.vy = -13; f.jumps = 2; spark(f.x+f.w/2, f.y+f.h*0.7, '#9cf', 10, 4); tone(700, 0.1, 'triangle', 0.14); }
  }

  // Attacks — directional move selection from current mx/my and whether airborne
  if (f.attackCooldown > 0) f.attackCooldown--;
  if (canControl && f.attackCooldown <= 0 && (attackPress || smashPress)) {
    // Ground side attacks should turn toward the input
    if (f.onGround && Math.abs(mx) > 0.3) f.facing = mx > 0 ? 1 : -1;
    const key = selectMove(f, smashPress, mx, my);
    const m = MOVES[key];
    f.attackType = key;
    f.attackAir = !f.onGround;
    f.attackTimer = m.startup + m.active + m.recover;
    f.attackCooldown = m.cd;
    // Per-move startup sfx
    if (smashPress) tone(140, 0.18, 'sawtooth', 0.18, 90);
    else if (key === 'jab') tone(540, 0.05, 'square', 0.12);
    else if (key === 'dair') tone(180, 0.16, 'sawtooth', 0.16, 110);
    else if (key === 'uair' || key === 'utilt') tone(620, 0.08, 'triangle', 0.14);
    else tone(420, 0.07, 'square', 0.14);
  }
  if (f.attackTimer > 0) f.attackTimer--;

  // Shield drain/regen
  if (f.shieldOn) { f.shieldHP = Math.max(0, f.shieldHP - 0.5); f.shieldRegen = 30; }
  else if (f.shieldRegen > 0) f.shieldRegen--;
  else f.shieldHP = Math.min(100, f.shieldHP + 0.7);

  // Gravity
  f.vy += GRAV;
  if (f.vy > 18) f.vy = 18;

  const prevY = f.y;
  f.x += f.vx; f.y += f.vy;

  // Platform collisions (one-way)
  landOnPlatforms(f, prevY);

  // Wall: none — fighters can fall off sides for KOs

  // Squash recovery
  f.squash += (1 - f.squash) * 0.18;

  // Knockback streak trail (item 7) — drop a ghost every other frame when
  // in heavy hitstun. Cap is enforced inside pushGhost so this is safe to call.
  if (f.hitstun > 0 && (Math.abs(f.vx) + Math.abs(f.vy) > 12) && (frame & 1) === 0) {
    pushGhost(f);
  }

  // Invul tick
  if (f.invul > 0) f.invul--;

  // KO check — off screen
  if (f.x < -120 || f.x > W+120 || f.y > H+150 || f.y < -260) {
    if (f.knockoutAnim <= 0) {
      f.knockoutAnim = 30;
      f.stocks--;
      flash();
      doShake(16);
      announce(`${f.name} KO'D!`, f === P1 ? '#f86' : '#9cf', 700);
      noise(0.3, 0.4, 600);
      tone(220, 0.4, 'sawtooth', 0.22, 60);
      if (f.stocks <= 0) {
        setTimeout(() => {
          // f is the eliminated fighter — the other one wins.
          if (f === P1) endGame(`${P2.name} WINS!`, '#f86');
          else endGame(`${P1.name} WINS!`, '#6cf');
        }, 600);
      } else {
        // respawn
        setTimeout(() => {
          f.x = W*0.5 - f.w/2; f.y = -60; f.vx = 0; f.vy = 0;
          f.pct = 0; f.hitstun = 0; f.invul = 90; f.knockoutAnim = 0;
        }, 700);
      }
    }
  }
}

function applyHits(attacker, defender) {
  const hb = hitboxFor(attacker);
  if (!hb) return;
  const m = MOVES[attacker.attackType]; if (!m) return;
  // Active frame window: timer counts DOWN from (startup+active+recover) to 0.
  // Elapsed = total - timer. Active when elapsed in [startup, startup+active).
  const total = m.startup + m.active + m.recover;
  const elapsed = total - attacker.attackTimer;
  if (elapsed < m.startup || elapsed >= m.startup + m.active) return;
  const tb = { x: defender.x, y: defender.y, w: defender.w, h: defender.h };
  if (aabb(hb, tb)) {
    const landed = applyKnockback(defender, hb.dmg, hb.angle, hb.base, hb.scaling, attacker);
    if (landed && hb.spike) {
      // meteor smash: extra downward push + longer hitstun + flashy feedback
      defender.vy = Math.max(defender.vy, 0) + 10;
      defender.hitstun = Math.min(60, defender.hitstun + 12);
      doShake(18); flash();
      spark(defender.x+defender.w/2, defender.y+defender.h/2, '#f8d', 22, 7);
      announce('SPIKE!', '#f8d', 500);
      noise(0.18, 0.35, 900);
    }
    // Single hit per swing — skip to recovery so the move can't reconnect.
    attacker.attackTimer = m.recover;
  }
}

// ---------- Draw ----------
// ---- Background depth helpers (Tier 1 items 1, 2, 18) ----
// Parallax offset: small fraction of fighter-average X displacement.
// During menu/end states P1/P2 are undefined — fall back to viewport center.
function bgParallax(depth) {
  const ax = (P1 && P2) ? (P1.x + P2.x) * 0.5 : W * 0.5;
  return (ax - W * 0.5) * depth;
}

let stars = null;
function seedStars() {
  // Density scales with viewport area so phones get fewer than desktops.
  const count = Math.max(30, Math.min(140, Math.floor((W * H) / 9000)));
  stars = new Array(count);
  for (let i = 0; i < count; i++) {
    stars[i] = {
      x: Math.random() * W,
      y: Math.random() * H * 0.66,
      r: 0.5 + Math.random() * 1.4,
      phase: Math.random() * Math.PI * 2,
      hue: 200 + Math.random() * 40,
    };
  }
}
// Invalidate on resize so density tracks viewport.
addEventListener('resize', () => { stars = null; });

function drawStars(t) {
  if (!stars) seedStars();
  const px = bgParallax(-0.08); // drift opposite the foreground for depth
  for (const s of stars) {
    const tw = 0.55 + 0.45 * Math.sin(t * 0.02 + s.phase);
    ctx.fillStyle = `hsla(${s.hue|0}, 70%, 85%, ${(tw * 0.9).toFixed(3)})`;
    ctx.beginPath();
    ctx.arc(s.x - px, s.y, s.r * (0.7 + tw * 0.6), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawClouds(t) {
  // Two strips drifting at different speeds — adds parallax even when fighters are still.
  const cloudY = H * 0.30;
  for (let layer = 0; layer < 2; layer++) {
    const speed = layer === 0 ? 0.15 : 0.08;
    const yOff = layer === 0 ? 0 : 26;
    const alpha = layer === 0 ? 0.05 : 0.07;
    ctx.fillStyle = `rgba(200,180,230,${alpha})`;
    const period = 200;
    const shift = ((t * speed) % period + period) % period;
    let x = -shift;
    while (x < W + 100) {
      const w = 60 + ((x * 2654435761) >>> 16) % 80;
      const h = 10 + ((x * 3266489917) >>> 16) % 6;
      ctx.beginPath();
      ctx.ellipse(x + w/2, cloudY + yOff, w/2, h, 0, 0, Math.PI*2);
      ctx.fill();
      x += w + 36;
    }
  }
}

function drawSkylineLayer(baseY, color, depth, base, range, seed) {
  const px = bgParallax(depth);
  ctx.fillStyle = color;
  ctx.beginPath();
  // Start a bit off-screen left so parallax shift never reveals an empty band.
  let x = -Math.ceil(Math.abs(px)) - 40;
  ctx.moveTo(x - px, baseY);
  while (x < W + Math.abs(px) + 40) {
    const hx = ((x + seed) * 2654435761) >>> 0;
    const hy = ((x + seed) * 3266489917) >>> 0;
    const w = base.w + (hx >>> 16) % range.w;
    const h = base.h + (hy >>> 16) % range.h;
    ctx.rect(x - px, baseY - h, w, h);
    x += w + 4;
  }
  ctx.fill();
}

function drawBackground() {
  const t = frame;

  // sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1140');
  g.addColorStop(0.5, '#2b1a5a');
  g.addColorStop(1, '#0a0820');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // moon — pulsing halo (item 2). Draw before stars so stars sit over the halo.
  const moonPx = bgParallax(0.02);
  const mx = W*0.82 - moonPx;
  const my = H*0.22;
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.02);
  ctx.fillStyle = `rgba(255,240,200,${(0.05 + 0.06 * pulse).toFixed(3)})`;
  ctx.beginPath(); ctx.arc(mx, my, 64 + pulse * 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(255,240,200,${(0.10 + 0.08 * pulse).toFixed(3)})`;
  ctx.beginPath(); ctx.arc(mx, my, 48 + pulse * 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,240,200,0.92)';
  ctx.beginPath(); ctx.arc(mx, my, 38, 0, Math.PI*2); ctx.fill();

  // stars (item 1) — drift slightly opposite the foreground
  drawStars(t);

  // distant clouds (item 18) — two strips drifting at different speeds
  drawClouds(t);

  // three skyline layers (item 1) — far → near, deepening parallax
  drawSkylineLayer(H*0.66, '#0c0628', 0.05, {w:18, h:14}, {w:28, h:30},  101);
  drawSkylineLayer(H*0.72, '#120a3c', 0.12, {w:26, h:22}, {w:48, h:60},  211);
  drawSkylineLayer(H*0.78, '#1a0e52', 0.22, {w:30, h:30}, {w:80, h:120}, 307);

  // atmospheric haze band (item 2) — sits over the skyline so depth reads as smog
  const hazeG = ctx.createLinearGradient(0, H*0.60, 0, H*0.82);
  hazeG.addColorStop(0,    'rgba(80,40,110,0)');
  hazeG.addColorStop(0.55, 'rgba(60,30,90,0.30)');
  hazeG.addColorStop(1,    'rgba(20,10,40,0.20)');
  ctx.fillStyle = hazeG;
  ctx.fillRect(0, H*0.60, W, H*0.24);

  // grid floor (unchanged — visual anchor on the ground)
  ctx.strokeStyle = 'rgba(120,200,255,0.08)';
  ctx.lineWidth = 1;
  for (let i=0;i<10;i++){
    const y = H*0.78 + i*30;
    if (y > H) break;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

function drawPlatform(p) {
  // top neon bar
  const g = ctx.createLinearGradient(0, p.y, 0, p.y+p.h);
  g.addColorStop(0, p.main ? '#6cf' : '#f6c');
  g.addColorStop(1, p.main ? '#048' : '#608');
  ctx.fillStyle = g;
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(p.x, p.y, p.w, 2);
  // glow underside
  ctx.fillStyle = p.main ? 'rgba(80,180,255,0.18)' : 'rgba(255,80,180,0.16)';
  ctx.fillRect(p.x-6, p.y, p.w+12, p.h+8);
}

// Lerp a base hex color toward a damaged tint as pct rises. Cap is around 180%
// so a fighter at the very edge of survivability reads strongly orange.
function damageTint(baseColor, pct) {
  const t = Math.min(1, Math.max(0, pct) / 180);
  if (t < 0.05) return baseColor;
  const m = baseColor.match(/^#([0-9a-f]{3,6})$/i);
  if (!m) return baseColor;
  const hex = m[1];
  let r, g, b;
  if (hex.length === 3) {
    r = parseInt(hex[0] + hex[0], 16);
    g = parseInt(hex[1] + hex[1], 16);
    b = parseInt(hex[2] + hex[2], 16);
  } else {
    r = parseInt(hex.slice(0, 2), 16);
    g = parseInt(hex.slice(2, 4), 16);
    b = parseInt(hex.slice(4, 6), 16);
  }
  const tr = 0xff, tg = 0x60, tb = 0x20;
  r = Math.round(r + (tr - r) * t);
  g = Math.round(g + (tg - g) * t);
  b = Math.round(b + (tb - b) * t);
  return `rgb(${r},${g},${b})`;
}

function drawFighter(f) {
  const cx = f.x + f.w/2;
  const baseY = f.y + f.h;

  // Idle breathing offsets (item 3) — only when calm and grounded.
  let breathOff = 0, armSway = 0;
  if (f.attackTimer === 0 && f.hitstun === 0 && f.onGround && f.knockoutAnim === 0) {
    breathOff = Math.sin(frame * 0.04 + f.blinkT) * 1.2;
    armSway   = Math.sin(frame * 0.04 + f.blinkT) * 0.06;
  }

  // Hit reaction (item 5) — tilt away from hit direction, decaying white overlay.
  let hitTilt = 0, hitFlashA = 0;
  if (f.hitstun > 0) {
    const dirSign = Math.sign(f.vx) || 1;
    hitTilt = dirSign * Math.min(0.22, Math.abs(f.vx) * 0.035);
    const fade = Math.max(0, Math.min(1, (f.hitstun - 2) / 6));
    hitFlashA = fade * 0.75;
  }

  ctx.save();
  // invul flicker
  if (f.invul > 0 && (frame >> 1) % 2 === 0) { ctx.globalAlpha = 0.4; }
  // breathing offset → squash transform → hit-reaction tilt → facing scale
  ctx.translate(cx, baseY + breathOff);
  if (hitTilt) ctx.rotate(hitTilt);
  const sx = (f.facing) * (1 + (1 - f.squash)*0.6);
  const sy = f.squash;
  ctx.scale(Math.sign(sx) || 1, 1);
  ctx.scale(Math.abs(sx), sy);
  // body — torso color shifts toward orange as pct rises (item 4)
  const bw = f.w, bh = f.h;
  const tint = damageTint(f.color, f.pct);
  // legs
  ctx.fillStyle = '#222';
  ctx.fillRect(-bw*0.32, -bh*0.32, bw*0.22, bh*0.32);
  ctx.fillRect( bw*0.10, -bh*0.32, bw*0.22, bh*0.32);
  // torso
  ctx.fillStyle = tint;
  roundRect(-bw*0.40, -bh*0.78, bw*0.80, bh*0.50, 8);
  ctx.fill();
  // belt
  ctx.fillStyle = '#111';
  ctx.fillRect(-bw*0.40, -bh*0.32, bw*0.80, 4);
  // arms — direction depends on the active move's dy (up/down/forward); idle adds tiny sway
  ctx.fillStyle = tint;
  const am = f.attackTimer > 0 ? MOVES[f.attackType] : null;
  const armPunch = am ? (am.cd >= 30 ? 18 : 12) : 0;
  const swayPx = (am === null) ? armSway * bw : 0;
  if (am && am.dy < -0.4) {
    // upward swing — raise arm
    ctx.fillRect( bw*0.10, -bh*0.95 - armPunch, 8, 10 + armPunch);
    ctx.fillRect(-bw*0.28 - 10, -bh*0.66, 10, 8);
  } else if (am && am.dy > 0.4) {
    // downward swing — drop arm
    ctx.fillRect( bw*0.10, -bh*0.55, 8, 10 + armPunch);
    ctx.fillRect(-bw*0.28 - 10, -bh*0.66, 10, 8);
  } else if (am && am.dx < 0) {
    // back-air — arm sticks out behind
    ctx.fillRect(-bw*0.28 - 10 - armPunch, -bh*0.66, 10 + armPunch, 8);
    ctx.fillRect( bw*0.28, -bh*0.66, 10, 8);
  } else {
    // forward swing OR idle sway
    ctx.fillRect( bw*0.28 + swayPx,      -bh*0.66, 10 + armPunch, 8);
    ctx.fillRect(-bw*0.28 - 10 - swayPx, -bh*0.66, 10, 8);
  }
  // head
  ctx.fillStyle = f.headColor;
  ctx.beginPath();
  ctx.arc(0, -bh*0.86, 16, 0, Math.PI*2);
  ctx.fill();
  // eyes
  ctx.fillStyle = '#000';
  const blink = (Math.sin(f.blinkT) > 0.95) ? 0 : 4;
  if (blink) {
    ctx.fillRect(-4, -bh*0.88, 3, blink);
    ctx.fillRect( 3, -bh*0.88, 3, blink);
  } else {
    ctx.fillRect(-5, -bh*0.88, 4, 1);
    ctx.fillRect( 3, -bh*0.88, 4, 1);
  }
  f.blinkT += 0.05;
  // mouth (angry when attacking, pained when in hitstun)
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.beginPath();
  if (f.hitstun > 0) {
    // grimace: small upside-down arc
    ctx.arc(0, -bh*0.78, 3, Math.PI, Math.PI*2);
  } else if (f.attackTimer > 0) {
    ctx.moveTo(-3, -bh*0.78); ctx.lineTo(3, -bh*0.78);
  } else {
    ctx.arc(0, -bh*0.82, 3, 0, Math.PI);
  }
  ctx.stroke();

  // Hit-reaction white overlay (item 5) — inside the squash transform so it follows the pose.
  if (hitFlashA > 0) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = `rgba(255,255,255,${hitFlashA.toFixed(3)})`;
    ctx.fillRect(-bw*0.6, -bh*1.05, bw*1.2, bh*1.1);
    ctx.globalCompositeOperation = 'source-over';
  }

  ctx.restore();

  // shield
  if (f.shieldOn) {
    ctx.save();
    ctx.globalAlpha = 0.55 * (f.shieldHP/100);
    const r = 42 + Math.sin(frame*0.3)*2;
    const grad = ctx.createRadialGradient(cx, f.y + f.h*0.4, 6, cx, f.y + f.h*0.4, r);
    grad.addColorStop(0, 'rgba(170,200,255,0.7)');
    grad.addColorStop(1, 'rgba(80,140,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, f.y + f.h*0.4, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // attack hitbox + directional motion swoosh
  if (f.attackTimer > 0) {
    const hb = hitboxFor(f);
    const m = MOVES[f.attackType];
    if (hb && m) {
      ctx.save();
      const isSmash = m.cd >= 30;
      const tint = m.spike ? '#f48' : isSmash ? '#f4c' : '#fc4';
      const accent = m.spike ? '#fdf' : isSmash ? '#fbf' : '#fed';
      // hitbox fill — louder when debug-on
      ctx.globalAlpha = settings.showHitbox ? 0.45 : 0.18;
      ctx.fillStyle = tint;
      ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
      if (settings.showHitbox) { ctx.globalAlpha = 0.9; ctx.strokeStyle = tint; ctx.lineWidth = 2; ctx.strokeRect(hb.x, hb.y, hb.w, hb.h); }

      // Swoosh: stroke an arc whose orientation matches the move's launch direction.
      // Progress within active window (0..1) controls arc sweep, fading near recovery.
      const total = m.startup + m.active + m.recover;
      const elapsed = total - f.attackTimer;
      const t = (elapsed - m.startup) / Math.max(1, m.active);
      if (t >= -0.2 && t <= 1.3) {
        const swirlAng = hb.angle;                              // already mirrored by facing
        const r = isSmash ? 38 : 28;
        const pivotX = cx + Math.cos(swirlAng) * (f.w*0.15);
        const pivotY = f.y + f.h*0.4 + Math.sin(swirlAng) * (f.h*0.10);
        const span = isSmash ? 1.4 : 1.1;
        const sweep = Math.min(1, Math.max(0, t));
        ctx.globalAlpha = 0.55 * (1 - Math.max(0, t-1));
        ctx.strokeStyle = accent;
        ctx.lineWidth = isSmash ? 6 : 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(pivotX, pivotY, r, swirlAng - span/2, swirlAng - span/2 + span*sweep);
        ctx.stroke();
      }

      // Spike indicator: downward chevron under the fighter during dair active frames
      if (m.spike) {
        const sx = cx, sy = f.y + f.h + 10;
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#f48';
        ctx.beginPath();
        ctx.moveTo(sx - 10, sy);
        ctx.lineTo(sx + 10, sy);
        ctx.lineTo(sx, sy + 14);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

function drawParticles() {
  for (let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25;
    p.life -= 0.04;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ---------- HUD update ----------
function refreshHud() {
  pct1El.textContent = Math.floor(P1.pct) + '%';
  pct2El.textContent = Math.floor(P2.pct) + '%';
  const colorize = (pct) => {
    const t = Math.min(1, pct/180);
    const r = Math.floor(120 + t*135);
    const g = Math.floor(220 - t*180);
    const b = Math.floor(255 - t*200);
    return `rgb(${r},${g},${b})`;
  };
  pct1El.style.color = colorize(P1.pct);
  pct2El.style.color = colorize(P2.pct);
  const maxS = settings.stocks;
  stocks1El.textContent = '●'.repeat(Math.max(0,P1.stocks)) + '○'.repeat(Math.max(0, maxS-P1.stocks));
  stocks2El.textContent = '●'.repeat(Math.max(0,P2.stocks)) + '○'.repeat(Math.max(0, maxS-P2.stocks));
}

// ---------- Main loop ----------
function loop() {
  frame++;

  // Poll gamepads once per frame (must happen before fighter updates read gpFrame)
  pollAllGamepads();

  // screen shake offset
  let shx = 0, shy = 0;
  if (shake > 0) {
    shx = (Math.random()-0.5) * shake;
    shy = (Math.random()-0.5) * shake;
    shake *= 0.88;
    if (shake < 0.3) shake = 0;
  }

  ctx.save();
  ctx.translate(shx, shy);
  drawBackground();
  for (const p of PLATS) drawPlatform(p);

  if (gameState === 'playing' && !paused) {
    if (hitStop > 0) { hitStop--; }
    else {
      updateFighter(P1, 'p1');
      updateFighter(P2, P2.isAI ? 'ai' : 'p2');
      // Hit resolution
      applyHits(P1, P2);
      applyHits(P2, P1);
    }
    refreshHud();
  } else if (gameState === 'playing' && paused) {
    refreshHud();
  }

  // Streak trails sit BEHIND live fighters
  drawGhosts();
  if (P2) drawFighter(P2);
  if (P1) drawFighter(P1);
  drawParticles();
  // Impact rings sit ABOVE particles for maximum punch
  drawRings();

  ctx.restore();

  // flash overlay
  if (flashTimer > 0) {
    ctx.globalAlpha = flashTimer/12;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    flashTimer--;
  }

  requestAnimationFrame(loop);
}
loop();

// Prevent context menu on long-press
addEventListener('contextmenu', e => e.preventDefault());

})();
</script>
