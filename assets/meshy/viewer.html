<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meshy Asset Review — Last Pulse</title>
<style>
  :root{ --bg:#1b1f17; --panel:#262c1d; --ink:#e8efe0; --accent:#e6c84d; --line:#4a553a; }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.4 system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:8px 14px;background:var(--panel);display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  header b{color:var(--accent)}
  .pill{font:inherit;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:#313925;color:var(--ink);cursor:pointer;font-size:12px}
  .pill.active{background:var(--accent);color:#1b1f17;border-color:var(--accent);font-weight:700}
  .pill.queued{opacity:.45}
  .pill.generated::before{content:"● ";color:#7fd35f}
  main{flex:1;display:flex;min-height:0}
  #left{flex:1;position:relative}
  #right{width:300px;border-left:1px solid var(--line);display:flex;flex-direction:column;background:#20251a}
  #right h3{margin:0;padding:10px 12px;font-size:12px;letter-spacing:.04em;color:var(--accent);border-bottom:1px solid var(--line);text-transform:uppercase}
  #overlay2d{display:block;margin:10px auto;background:#2b3422;border:1px solid var(--line);border-radius:8px}
  #info{padding:0 12px;font-size:12px}
  #info code{color:#bfe0c0}
  .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #353d28}
  canvas#gl{display:block}
  #tools{padding:10px 12px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--line);margin-top:auto}
  #tools button{flex:1;min-width:120px}
  #note{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.55);padding:7px 11px;border-radius:8px;font-size:12px;max-width:64ch}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:24px;text-align:center;color:#ffb4b4;background:rgba(20,24,16,.85)}
  a{color:var(--accent)}
  small{opacity:.6}
</style>
</head>
<body>
<header>
  <b>Meshy Review</b>
  <span id="tabs" style="display:flex;gap:6px;flex-wrap:wrap"></span>
  <span style="margin-left:auto"><small>drag rotate · scroll zoom · right-drag pan</small></span>
</header>
<main>
  <div id="left">
    <div id="note"></div>
    <div id="err"></div>
  </div>
  <aside id="right">
    <h3>2D source chibi (drawHuman)</h3>
    <canvas id="overlay2d" width="200" height="200"></canvas>
    <div id="info"></div>
    <div id="tools">
      <button class="pill" id="snap">📸 Save sprite PNG</button>
      <button class="pill" id="rig">🦴 Rig this (5 cr)</button>
    </div>
  </aside>
</main>

<script type="importmap">
{ "imports": {
  "three": "../vendor/three/three.module.js",
  "three/addons/controls/OrbitControls.js": "../vendor/three/OrbitControls.js",
  "three/addons/loaders/GLTFLoader.js": "../vendor/three/GLTFLoader.js"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const TAU = Math.PI*2, INK = '#23281b';
const noteEl=document.getElementById('note'), errEl=document.getElementById('err');
const infoEl=document.getElementById('info'), tabsEl=document.getElementById('tabs');

// ---------- three.js setup ----------
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.getElementById('left').appendChild(renderer.domElement);
renderer.domElement.id='gl';
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x2b3422);
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.HemisphereLight(0xffffff, 0x404030, 1.1));
const key=new THREE.DirectionalLight(0xffffff,1.4); key.position.set(3,5,4); scene.add(key);
const fill=new THREE.DirectionalLight(0xffffff,0.5); fill.position.set(-4,2,-3); scene.add(fill);
const grid=new THREE.GridHelper(4,8,0x55613f,0x3a4429); scene.add(grid);
const loader=new GLTFLoader();
let current=null, currentAsset=null, lastSize=new THREE.Vector3(1,1,1);
let mixer=null, clock=new THREE.Clock();

function frame(obj){
  const box=new THREE.Box3().setFromObject(obj), size=box.getSize(new THREE.Vector3()), c=box.getCenter(new THREE.Vector3());
  obj.position.sub(c); obj.position.y += size.y/2; lastSize.copy(size);
  const m=Math.max(size.x,size.y,size.z)||1;
  camera.position.set(m*1.6,m*1.1,m*1.9); controls.target.set(0,size.y/2,0);
  camera.near=m/100; camera.far=m*100; camera.updateProjectionMatrix(); controls.update();
}
function frontView(){ const m=Math.max(lastSize.x,lastSize.y,lastSize.z)||1; camera.position.set(0,lastSize.y/2,m*2.2); controls.target.set(0,lastSize.y/2,0); controls.update(); }

function loadAsset(a, variant){
  currentAsset=a; errEl.style.display='none';
  if(current){ scene.remove(current); current=null; }
  if(mixer){ mixer.stopAllAction(); mixer=null; }
  document.querySelectorAll('#tabs .pill').forEach(p=>p.classList.toggle('active', p.dataset.id===a.id));
  draw2D(a);
  document.getElementById('rig').style.display = a.type==='weapon' ? 'none':'';
  // variant toggle: 'static' (preview mesh), 'anim' (walking, if rigged)
  variant = variant || (a.anim ? 'anim' : 'static');
  const file = variant==='anim' && a.anim ? a.anim : a.file;
  if(a.status!=='generated'){
    noteEl.innerHTML = '<b>'+a.label+'</b> — <span style="color:#ffd166">queued, not generated yet</span>. The 2D source chibi is shown at right.';
    infoEl.innerHTML = infoRows(a, null);
    return;
  }
  noteEl.textContent='loading '+file+' …';
  loader.load(file, g=>{
    current=g.scene; scene.add(current); frame(current);
    if(variant==='anim' && g.animations && g.animations.length){
      mixer=new THREE.AnimationMixer(current); mixer.clipAction(g.animations[0]).play(); clock.getDelta();
    }
    let tris=0; current.traverse(o=>{ if(o.isMesh&&o.geometry){ const ge=o.geometry; tris += (ge.index?ge.index.count:ge.attributes.position.count)/3; }});
    const tag = a.anim ? ' <span style="opacity:.7">['+(variant==='anim'?'🚶 walking':'static')+' — '+(variant==='anim'?'<a href=# id=vstatic>show static</a>':'<a href=# id=vanim>show walk</a>')+']</span>' : '';
    noteEl.innerHTML='<b style="color:#e6c84d">'+a.label+'</b> · '+file+tag;
    const sw=document.getElementById('vstatic'), aw=document.getElementById('vanim');
    if(sw) sw.onclick=ev=>{ev.preventDefault();loadAsset(a,'static');};
    if(aw) aw.onclick=ev=>{ev.preventDefault();loadAsset(a,'anim');};
    infoEl.innerHTML=infoRows(a, Math.round(tris));
  }, undefined, e=>{
    errEl.style.display='flex';
    errEl.innerHTML='Could not load <b>'+a.file+'</b>.<br>Serve over HTTP, not file://<br><br><code>python3 -m http.server 8001</code> from the repo root, then open<br><a href="http://localhost:8001/assets/meshy/viewer.html">localhost:8001/assets/meshy/viewer.html</a><br><br><small>'+(e?.message||e)+'</small>';
  });
}
function infoRows(a, tris){
  const r=(k,v)=>'<div class="row"><span>'+k+'</span><code>'+v+'</code></div>';
  return r('type',a.type)+r('source',a.source)+r('status',a.status)+(a.rigged?r('rigged','✅ walk+run'):'')+(a.task_id?r('task_id',a.task_id.slice(0,8)+'…'):'')+(tris!=null?r('triangles',tris.toLocaleString()):'');
}

// ---------- 2D chibi overlay (faithful port of index.html drawHuman/drawHair) ----------
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function draw2D(a){
  const cv=document.getElementById('overlay2d'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height); ctx.save(); ctx.translate(100,118); ctx.scale(2.4,2.4);
  if(a.type==='weapon'){ ctx.restore(); ctx.fillStyle='#8a9377'; ctx.font='12px system-ui'; ctx.textAlign='center'; ctx.fillText('(weapon — see 3D)',100,118); return; }
  if(a.type==='zombie'){ drawZombie2D(ctx,a.look); ctx.restore(); return; }
  drawHuman2D(ctx,a.look); ctx.restore();
}
function drawHair2D(ctx,L,hy,flip){
  ctx.fillStyle=L.hair; ctx.strokeStyle=INK; ctx.lineWidth=1.4; ctx.lineJoin='round'; ctx.lineCap='round';
  const cap=()=>{ ctx.fillStyle=L.hair; ctx.beginPath(); ctx.arc(0,hy-2,9.7,Math.PI*1.02,-0.02); ctx.lineTo(8,hy+1.5); ctx.lineTo(-8,hy+1.5); ctx.closePath(); ctx.fill(); ctx.stroke(); };
  switch(L.style){
    case 'curly': for(const o of [[-6,-5],[0,-8.5],[6,-5],[-3,-7.5],[3,-7.5]]){ ctx.beginPath(); ctx.arc(o[0],hy+o[1],4.2,0,TAU); ctx.fill(); ctx.stroke(); } break;
    case 'long': cap(); ctx.fillStyle=L.hair; ctx.fillRect(-10,hy-4,3.4,13); ctx.fillRect(6.6,hy-4,3.4,13); ctx.strokeRect(-10,hy-4,3.4,13); ctx.strokeRect(6.6,hy-4,3.4,13); break;
    case 'beard': cap(); ctx.fillStyle=L.hair; ctx.beginPath(); ctx.moveTo(-7,hy+1.5); ctx.quadraticCurveTo(0,hy+11,7,hy+1.5); ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 'dreads': cap(); ctx.fillStyle=L.hair; for(let i=-2;i<=2;i++){ ctx.fillRect(i*4-1.1,hy-2,2.3,10); } break;
    case 'mask': cap(); ctx.fillStyle='#cfe8d0'; roundRect(ctx,-9,hy,18,8,2); ctx.fill(); ctx.stroke(); break;
    case 'glasses': cap(); ctx.strokeStyle='#111'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(-3,hy-0.3,3,0,TAU); ctx.arc(4,hy-0.3,3,0,TAU); ctx.stroke(); break;
    case 'ninja': ctx.fillStyle=L.outfit; ctx.beginPath(); ctx.arc(0,hy-1.5,10.5,0,TAU); ctx.fill(); ctx.stroke(); ctx.fillStyle=L.skin; ctx.fillRect(-8,hy-3.5,16,5); break;
    case 'mohawk': ctx.fillStyle=L.hair; ctx.beginPath(); ctx.moveTo(-2.4,hy-3); ctx.lineTo(-3,hy-14); ctx.lineTo(0,hy-16); ctx.lineTo(3,hy-14); ctx.lineTo(2.4,hy-3); ctx.closePath(); ctx.fill(); ctx.stroke(); for(const sx of [-7.5,7.5]){ ctx.fillRect(sx-1,hy-6,2,5); } break;
    case 'cap': ctx.fillStyle=L.hair; ctx.beginPath(); ctx.arc(0,hy-2,9.9,Math.PI,0); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.ellipse(flip*8,hy-1,7.5,2.6,0,0,TAU); ctx.fill(); ctx.stroke(); break;
    case 'frog': ctx.fillStyle=L.skin; ctx.beginPath(); ctx.arc(-5,hy-7.5,4.3,0,TAU); ctx.arc(5,hy-7.5,4.3,0,TAU); ctx.fill(); ctx.stroke(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,hy-7.5,2,0,TAU); ctx.arc(5,hy-7.5,2,0,TAU); ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-5,hy-7,1,0,TAU); ctx.arc(5,hy-7,1,0,TAU); ctx.fill(); ctx.strokeStyle='#2c5a22'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(0,hy+1.5,5,0.1*Math.PI,0.9*Math.PI); ctx.stroke(); break;
    case 'visor': cap(); ctx.fillStyle='#1d2230'; roundRect(ctx,-9,hy-3,18,7,3); ctx.fill(); ctx.stroke(); ctx.strokeStyle='#39e6d6'; ctx.lineWidth=1.8; ctx.beginPath(); ctx.moveTo(-6.5,hy+0.4); ctx.lineTo(6.5,hy+0.4); ctx.stroke(); ctx.fillStyle='#bafff6'; ctx.beginPath(); ctx.arc(flip*3.5,hy+0.4,1.1,0,TAU); ctx.fill(); break;
    case 'tophat': cap(); ctx.fillStyle='#23252b'; ctx.beginPath(); ctx.ellipse(0,hy-6,11,2.6,0,0,TAU); ctx.fill(); ctx.stroke(); roundRect(ctx,-6.5,hy-15,13,9,1.5); ctx.fill(); ctx.stroke(); ctx.fillStyle=L.outfit; ctx.fillRect(-6.5,hy-8.6,13,2.4); break;
    case 'crown': cap(); ctx.fillStyle='#ffcf3a'; ctx.strokeStyle='#a9791a'; ctx.lineWidth=1.3; ctx.beginPath(); ctx.moveTo(-8,hy-6); ctx.lineTo(-8,hy-9); ctx.lineTo(-4,hy-6.5); ctx.lineTo(0,hy-11); ctx.lineTo(4,hy-6.5); ctx.lineTo(8,hy-9); ctx.lineTo(8,hy-6); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle='#e2452f'; ctx.beginPath(); ctx.arc(0,hy-7,1.2,0,TAU); ctx.fill(); break;
    default: cap();
  }
}
function drawHuman2D(ctx,L){
  const flip=1, hy=-17, ty=-7;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.fillStyle='rgba(0,0,0,.20)'; ctx.beginPath(); ctx.ellipse(0,19,15,5,0,0,TAU); ctx.fill();
  ctx.strokeStyle=INK; ctx.lineWidth=6.5; ctx.beginPath(); ctx.moveTo(-4,7); ctx.lineTo(-5,16); ctx.moveTo(4,7); ctx.lineTo(5,16); ctx.stroke();
  ctx.strokeStyle='#3a3a42'; ctx.lineWidth=4.4; ctx.beginPath(); ctx.moveTo(-4,7); ctx.lineTo(-5,16); ctx.moveTo(4,7); ctx.lineTo(5,16); ctx.stroke();
  ctx.fillStyle='#15151a'; ctx.beginPath(); ctx.ellipse(-5,17.6,3.4,2,0,0,TAU); ctx.ellipse(5,17.6,3.4,2,0,0,TAU); ctx.fill();
  ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.fillStyle=L.outfit; roundRect(ctx,-9,ty,18,17,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle=L.skin; ctx.strokeStyle=INK; ctx.lineWidth=1.6; roundRect(ctx,-2.6,hy+6,5.2,5,2); ctx.fill();
  ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.fillStyle=L.skin; ctx.beginPath(); ctx.arc(0,hy,9.5,0,TAU); ctx.fill(); ctx.stroke();
  drawHair2D(ctx,L,hy,flip);
  if(L.style!=='frog'&&L.style!=='visor'){ const ex=flip*1.2;
    ctx.strokeStyle='rgba(24,18,12,.65)'; ctx.lineWidth=1.3; ctx.beginPath(); ctx.moveTo(ex-4.6,hy-3.6); ctx.lineTo(ex-1.6,hy-4.1); ctx.moveTo(ex+1.6,hy-4.1); ctx.lineTo(ex+4.6,hy-3.6); ctx.stroke();
    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(ex-3,hy-0.2,1.7,0,TAU); ctx.arc(ex+3,hy-0.2,1.7,0,TAU); ctx.fill();
    ctx.strokeStyle='#8a4a3a'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(ex,hy+3,2,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
}
function drawZombie2D(ctx,L){
  const s=L.size||1, hy=-17*s, ty=-7*s;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.fillStyle='rgba(0,0,0,.20)'; ctx.beginPath(); ctx.ellipse(0,19,15*s,5,0,0,TAU); ctx.fill();
  ctx.strokeStyle=INK; ctx.lineWidth=6.5; ctx.beginPath(); ctx.moveTo(-4*s,7*s); ctx.lineTo(-5*s,16*s); ctx.moveTo(4*s,7*s); ctx.lineTo(5*s,16*s); ctx.stroke();
  ctx.strokeStyle=L.torso; ctx.lineWidth=4.4; ctx.beginPath(); ctx.moveTo(-4*s,7*s); ctx.lineTo(-5*s,16*s); ctx.moveTo(4*s,7*s); ctx.lineTo(5*s,16*s); ctx.stroke();
  ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.fillStyle=L.torso; roundRect(ctx,-9*s,ty,18*s,17*s,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle=L.skin; ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,hy,9.5*s,0,TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-3*s,hy-0.5,2*s,0,TAU); ctx.arc(3*s,hy-0.5,2*s,0,TAU); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-3*s,hy-0.3,0.9*s,0,TAU); ctx.arc(3*s,hy-0.3,0.9*s,0,TAU); ctx.fill();
  ctx.strokeStyle='#2c4a1e'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(-4*s,hy+4*s); ctx.lineTo(4*s,hy+4*s); ctx.stroke();
}

// ---------- snapshot (front orthographic-ish) → PNG ----------
document.getElementById('snap').onclick=()=>{
  if(!currentAsset) return;
  if(currentAsset.status==='generated'){ frontView(); renderer.render(scene,camera);
    renderer.domElement.toBlob(b=>downloadBlob(b, currentAsset.id+'-3d.png'),'image/png');
  } else {
    document.getElementById('overlay2d').toBlob(b=>downloadBlob(b, currentAsset.id+'-2d.png'),'image/png');
  }
};
function downloadBlob(blob,name){ const u=URL.createObjectURL(blob),a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

// ---------- rig button (instructional — MCP call runs from Claude, not the browser) ----------
document.getElementById('rig').onclick=()=>{
  if(!currentAsset||currentAsset.status!=='generated'){ alert('Generate this model first.'); return; }
  prompt('Ask Claude to run meshy_rig on this model. Copy the task_id:', currentAsset.task_id);
};

// ---------- boot: build tabs from manifest ----------
fetch('manifest.json').then(r=>r.json()).then(mf=>{
  const order={character:0,zombie:1,weapon:2};
  mf.assets.sort((a,b)=>(order[a.type]-order[b.type]));
  for(const a of mf.assets){
    const b=document.createElement('button');
    b.className='pill '+(a.status==='generated'?'generated':'queued'); b.dataset.id=a.id; b.textContent=a.label;
    b.onclick=()=>loadAsset(a); tabsEl.appendChild(b);
  }
  const hashId=location.hash.replace('#','');
  const first=(hashId&&mf.assets.find(a=>a.id===hashId))||mf.assets.find(a=>a.status==='generated')||mf.assets[0];
  loadAsset(first);
  addEventListener('hashchange',()=>{ const a=mf.assets.find(x=>x.id===location.hash.replace('#','')); if(a) loadAsset(a); });
}).catch(e=>{ errEl.style.display='flex'; errEl.innerHTML='Could not load <b>manifest.json</b> — serve over HTTP.<br><small>'+e+'</small>'; });

function resize(){ const l=document.getElementById('left'),w=l.clientWidth,h=l.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();
(function loop(){ requestAnimationFrame(loop); controls.update(); if(mixer) mixer.update(clock.getDelta()); renderer.render(scene,camera); })();
</script>
</body>
</html>
